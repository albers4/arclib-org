{{- if .Params.math | default site.Params.math -}}
  <link rel="stylesheet" href="{{ "/lib/katex/katex.css" | relURL }}">
  <script defer src="{{ "/lib/katex/katex.js" | relURL }}"></script>
  <script defer src="{{ "/lib/katex/contrib/auto-render.js" | relURL }}"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      renderMathInElement(document.body, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false},
          {left: '\\(', right: '\\)', display: false},
          {left: '\\[', right: '\\]', display: true}
        ],
        throwOnError : false
      });
    });
  </script>
{{- end -}}
